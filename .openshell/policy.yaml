version: 1

# ── Static (locked at sandbox creation) ──────────────────────────────────────

filesystem_policy:
  include_workdir: true          # auto-add /sandbox to read_write
  read_write:
    - /home/sandbox              # user home — repo and worktree live under here
    - /tmp
    - /dev/null                  # required by scp, shells, and many Unix tools
    - /dev/ptmx                  # pty creation (needed by script(1) for ^Y capture)
    - /dev/pts                   # pty slave devices
  read_only:
    - /usr
    - /etc
    - /opt
    - /proc
    - /dev/urandom

landlock:
  compatibility: best_effort

process:
  run_as_user: sandbox
  run_as_group: sandbox

# ── Dynamic (hot-reloadable) ─────────────────────────────────────────────────
# Deny-by-default: anything not listed below is blocked.
# Every entry needs `binaries` — without it, OPA denies all connections.
# We use path: "/**" (allow any binary) since the security boundary is at
# the network level (which hosts are reachable), not per-binary.

network_policies:

  # ── Git & GitHub ───────────────────────────────────────────────────────────
  github:
    name: GitHub
    endpoints:
      - host: github.com
        port: 443
      - host: "*.github.com"
        port: 443
      - host: "*.githubusercontent.com"
        port: 443
      # GitHub release assets redirect to Azure Blob Storage
      - host: "*.blob.core.windows.net"
        port: 443
      - host: ssh.github.com
        port: 22
      - host: ssh.github.com
        port: 443
    binaries:
      - path: "/**"

  # ── Node.js / npm ─────────────────────────────────────────────────────────
  npm:
    name: npm registry
    endpoints:
      - host: registry.npmjs.org
        port: 443
      - host: "*.npmjs.org"
        port: 443
      - host: "*.npmjs.com"
        port: 443
    binaries:
      - path: "/**"

  # ── Rust / Cargo ───────────────────────────────────────────────────────────
  cargo:
    name: Cargo registry
    endpoints:
      - host: crates.io
        port: 443
      - host: "*.crates.io"
        port: 443
      - host: static.rust-lang.org
        port: 443
      - host: static.crates.io
        port: 443
      - host: sh.rustup.rs
        port: 443
    binaries:
      - path: "/**"

  # ── Ruby / RubyGems ───────────────────────────────────────────────────────
  rubygems:
    name: RubyGems
    endpoints:
      - host: rubygems.org
        port: 443
      - host: "*.rubygems.org"
        port: 443
    binaries:
      - path: "/**"

  # ── Python / PyPI ──────────────────────────────────────────────────────────
  pypi:
    name: PyPI
    endpoints:
      - host: pypi.org
        port: 443
      - host: files.pythonhosted.org
        port: 443
    binaries:
      - path: "/**"

  # ── Go ─────────────────────────────────────────────────────────────────────
  golang:
    name: Go modules
    endpoints:
      - host: proxy.golang.org
        port: 443
      - host: sum.golang.org
        port: 443
      - host: storage.googleapis.com
        port: 443
    binaries:
      - path: "/**"

  # ── Lua ────────────────────────────────────────────────────────────────────
  lua:
    name: Lua
    endpoints:
      - host: www.lua.org
        port: 443
    binaries:
      - path: "/**"
  luarocks:
    name: LuaRocks
    endpoints:
      - host: luarocks.org
        port: 443
      - host: "*.luarocks.org"
        port: 443
    binaries:
      - path: "/**"

  # ── Elixir / Hex ──────────────────────────────────────────────────────────
  hex:
    name: Hex packages
    endpoints:
      - host: hex.pm
        port: 443
      - host: "*.hex.pm"
        port: 443
    binaries:
      - path: "/**"

  # ── AI APIs ────────────────────────────────────────────────────────────────
  ai_anthropic:
    name: Anthropic (Claude)
    endpoints:
      - host: api.anthropic.com
        port: 443
      - host: "*.anthropic.com"
        port: 443
      - host: platform.claude.com
        port: 443
      - host: "*.claude.com"
        port: 443
      - host: claude.ai
        port: 443
      - host: "*.claude.ai"
        port: 443
      - host: sentry.io
        port: 443
      - host: "*.sentry.io"
        port: 443
    binaries:
      - path: "/**"

  ai_openai:
    name: OpenAI (Codex)
    endpoints:
      - host: api.openai.com
        port: 443
      - host: "*.openai.com"
        port: 443
      - host: chatgpt.com
        port: 443
      - host: "*.chatgpt.com"
        port: 443
    binaries:
      - path: "/**"

  ai_google:
    name: Google (Gemini)
    endpoints:
      - host: generativelanguage.googleapis.com
        port: 443
    binaries:
      - path: "/**"

  ai_amazon:
    name: Amazon Q
    endpoints:
      - host: "*.amazonaws.com"
        port: 443
    binaries:
      - path: "/**"

  # ── System / package managers ──────────────────────────────────────────────
  ubuntu_apt:
    name: Ubuntu apt
    endpoints:
      - host: archive.ubuntu.com
        port: 443
      - host: ports.ubuntu.com
        port: 443
      - host: security.ubuntu.com
        port: 443
    binaries:
      - path: "/**"

  github_cli:
    name: GitHub CLI apt repo
    endpoints:
      - host: cli.github.com
        port: 443
    binaries:
      - path: "/**"
